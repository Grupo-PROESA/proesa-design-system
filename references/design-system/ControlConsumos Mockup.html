<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ControlConsumos · Mockup PROESA-fied</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --font-sans: 'Source Sans 3', 'Calibri', 'Segoe UI', system-ui, sans-serif;

    /* PROESA tokens (alineados con el Portal/gateway) */
    --proesa-navy-900: #14275A;
    --proesa-navy-800: #1B3373;
    --proesa-navy-700: #204590;   /* PRIMARY brand */
    --proesa-navy-500: #4B86C7;
    --proesa-navy-300: #8CC4EA;
    --proesa-navy-200: #BFDBF1;
    --proesa-navy-100: #E3EEF8;
    --proesa-navy-50:  #F2F7FC;

    --proesa-teal-700: #2C8A7A;
    --proesa-teal-600: #37A992;   /* PRIMARY accent */
    --proesa-teal-500: #41B292;
    --proesa-teal-300: #7BC4B0;
    --proesa-teal-100: #E2F2EC;

    --proesa-mist:  #F4F6FA;       /* canvas */
    --proesa-fog:   #E7EAF1;       /* borders */
    --proesa-ink:    #0F1626;
  }
  html, body { font-family: var(--font-sans); font-feature-settings: 'tnum' 1; }
  body { background: var(--proesa-mist); color: var(--proesa-ink); }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  /* Scrollbar discreto */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(20,39,90,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(20,39,90,0.3); }

  /* Brand chip — link de regreso al Portal (UX hallazgo §E.6) */
  .portal-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px 5px 5px;
    border-radius: 999px;
    background: var(--proesa-navy-50);
    border: 1px solid var(--proesa-navy-100);
    color: var(--proesa-navy-700);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: all 180ms ease;
    text-decoration: none;
    cursor: pointer;
  }
  .portal-chip:hover {
    background: var(--proesa-navy-100);
    border-color: var(--proesa-navy-200);
    transform: translateX(-1px);
  }
  .portal-chip__avatar {
    width: 22px;
    height: 22px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--proesa-navy-700) 0%, var(--proesa-teal-600) 100%);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .portal-chip__sep {
    color: var(--proesa-navy-300);
    font-weight: 400;
  }
  .portal-chip__app {
    color: var(--proesa-navy-700);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .portal-chip__back {
    opacity: 0.6;
    transition: opacity 180ms;
  }
  .portal-chip:hover .portal-chip__back { opacity: 1; }
</style>
</head>
<body>

<div id="root"></div>

<script src="cc-mock/cc-data.js"></script>
<script type="text/babel" src="cc-mock/cc-ui.jsx" data-presets="react"></script>
<script type="text/babel" src="cc-mock/cc-shell.jsx" data-presets="react"></script>
<script type="text/babel" src="cc-mock/cc-pages.jsx" data-presets="react"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React; // local to top-level script

// Cada "vista" del mockup es un escenario completo del producto
const VIEWS = [
  { id: 'login',         label: 'Login',                 chrome: 'fullscreen' },
  { id: 'inicio',        label: 'Inicio',                chrome: 'shell', route: '/',        title: 'Inicio',  subtitle: 'Resumen del día' },
  { id: 'credito',       label: 'Dashboard de Crédito',  chrome: 'shell', route: '/credito', title: 'Crédito', subtitle: '42 clientes con saldo' },
  { id: 'alertas',       label: 'Drawer de alertas',     chrome: 'shell', route: '/credito', title: 'Crédito', subtitle: '42 clientes con saldo', alertOpen: true },
];

function ViewSwitcher({ current, onChange }) {
  return (
    <div
      data-screen-label="00 View Switcher"
      className="fixed bottom-4 left-1/2 -translate-x-1/2 z-[100] bg-white rounded-full shadow-2xl border border-gray-200 flex items-center gap-1 p-1.5 px-2"
      style={{ boxShadow: '0 10px 40px -10px rgba(0,0,0,0.3)' }}
    >
      <span className="text-[10px] uppercase tracking-wider font-semibold text-gray-400 px-2">Mockup</span>
      {VIEWS.map(v => (
        <button
          key={v.id}
          onClick={() => onChange(v.id)}
          className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${
            current === v.id
              ? 'bg-blue-600 text-white shadow-sm'
              : 'text-gray-600 hover:bg-gray-100'
          }`}
        >
          {v.label}
        </button>
      ))}
    </div>
  );
}

function ShellView({ view, alertOpen: externalAlertOpen, onAlertClose }) {
  const [collapsed, setCollapsed] = useState(false);
  const [alertOpen, setAlertOpen] = useState(externalAlertOpen || false);
  const [activeRoute, setActiveRoute] = useState(view.route);

  useEffect(() => {
    setAlertOpen(externalAlertOpen || false);
    setActiveRoute(view.route);
  }, [view.route, externalAlertOpen]);

  const Page =
    activeRoute === '/'        ? InicioPage :
    activeRoute === '/credito' ? CreditoPage :
    InicioPage;

  return (
    <div className="flex h-full bg-slate-100" data-screen-label={`0${VIEWS.findIndex(v => v.id === view.id)} ${view.label}`}>
      <Sidebar
        activeRoute={activeRoute}
        onNavigate={setActiveRoute}
        collapsed={collapsed}
        onToggleCollapse={() => setCollapsed(c => !c)}
      />
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        <Header
          title={view.title}
          subtitle={view.subtitle}
          alerts={window.CC_ALERTAS}
          pendientesCount={7}
          onPendientesClick={() => setActiveRoute('/credito')}
          onAlertClick={() => setAlertOpen(true)}
        />
        <main className="flex-1 overflow-auto p-6">
          <Page />
        </main>
      </div>
      <AlertDrawer
        open={alertOpen}
        onClose={() => { setAlertOpen(false); onAlertClose?.(); }}
        alertas={window.CC_ALERTAS}
      />
    </div>
  );
}

function App() {
  const [currentId, setCurrentId] = useState('inicio');
  const view = VIEWS.find(v => v.id === currentId);

  return (
    <div className="h-screen w-screen overflow-hidden bg-slate-100">
      {view.chrome === 'fullscreen' ? (
        <div className="h-full w-full overflow-auto" data-screen-label={`0${VIEWS.findIndex(v => v.id === view.id)} ${view.label}`}>
          <LoginPage />
        </div>
      ) : (
        <ShellView
          key={view.id}
          view={view}
          alertOpen={view.alertOpen}
          onAlertClose={() => {
            // Si el view era el de alertas, vuelve al de crédito
            if (view.id === 'alertas') setCurrentId('credito');
          }}
        />
      )}
      <ViewSwitcher current={currentId} onChange={setCurrentId} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
